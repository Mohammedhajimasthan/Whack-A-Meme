<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Whack-A-Meme</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme1">

<div class="top-bar">
  <select id="langSelect"></select>
  <button id="modeBtn">🌙</button>
</div>

<div class="card">
  <h1>😂 AI Whack-A-Meme</h1>
  <p class="subtitle">Hit fast. Get roasted.</p>

  <div class="status">
    <span id="score">Score: 0</span>
    <span id="timer">Time: 30</span>
  </div>

  <div class="grid">
    <div class="hole">😂</div>
    <div class="hole">😎</div>
    <div class="hole">🤡</div>
    <div class="hole">🐸</div>
    <div class="hole">🐶</div>
    <div class="hole">🐱</div>
  </div>

  <div class="ai-box" id="aiText">
    Choose language & start!
  </div>

  <button id="startBtn">Start Game</button>
</div>

<script src="app.js"></script>
</body>
</html>
